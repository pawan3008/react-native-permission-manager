buildscript {
  ext.getExtOrDefault = { name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["PermissionManager_" + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.2.1"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
  }
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

android {
  namespace "com.permissionmanager"
  compileSdkVersion getExtOrDefault("compileSdkVersion") ?: 34

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion") ?: 23
    targetSdkVersion getExtOrDefault("targetSdkVersion") ?: 34
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  sourceSets {
    main {
      // Codegen output (java/) is generated at build time when New
      // Architecture is enabled; kept out of source control.
      java.srcDirs += ["src/main/java", "src/main/kotlin"]
    }
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
  implementation "androidx.core:core-ktx:1.12.0"
}
